<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出错了</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            color: #5a6c7d;
            line-height: 1.6;
            background: linear-gradient(135deg, #f5f7fa, #e4e8ec);
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .error-box {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 50px;
            width: 340px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            transition: all 0.4s ease;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .error-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
        }

        h2 {
            color: #4a90e2;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 26px;
        }

        .error-icon {
            font-size: 70px;
            color: #f87171;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .error-message {
            font-size: 17px;
            color: #6b7280;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #4a90e2, #60a5fa);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
        }

        button:hover {
            background: linear-gradient(135deg, #60a5fa, #4a90e2);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4);
        }

        button i {
            margin-right: 8px;
        }

        .decoration {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(45deg, #4a90e2, #60a5fa);
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
        }

        .decoration-1 {
            top: -150px;
            left: -150px;
            width: 300px;
            height: 300px;
        }

        .decoration-2 {
            bottom: -150px;
            right: -150px;
            width: 300px;
            height: 300px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="decoration decoration-1"></div>
        <div class="decoration decoration-2"></div>
        <div class="error-box">
            <i class="fas fa-exclamation-circle error-icon"></i>
            <h2>出错了</h2>
            <p class="error-message">{{ error_message }}</p>
            <button onclick="goBack()"><i class="fas fa-arrow-left"></i> 返回上一页</button>
        </div>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
