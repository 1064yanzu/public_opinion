{% extends 'index.html' %}

{% block css %}
<link href="{{ url_for('static', filename='assets/css/case_analysis.css') }}" rel="stylesheet">
<link href="https://lf26-cdn-tos.bytecdntp.com/cdn/expire-1-M/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="main-container">
    <!-- 顶部搜索区 -->
    <div class="header-section">
        <h2><i class="fas fa-database"></i> 舆情案例分析库</h2>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入关键词搜索案例...">
            <button type="button" class="search-btn">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </div>

    <div class="content-wrapper">
        <!-- 左侧筛选器 -->
        <div class="filter-section">
            <h4><i class="fas fa-filter"></i> 筛选条件</h4>
            
            <div class="filter-group">
                <label><i class="fas fa-tag"></i> 案例类型</label>
                <select id="caseType" class="form-select">
                    <option value="">全部类型</option>
                    <option value="政府舆情">政府舆情</option>
                    <option value="企业舆情">企业舆情</option>
                    <option value="教育舆情">教育舆情</option>
                </select>
            </div>

            <div class="filter-group">
                <label><i class="fas fa-check-circle"></i> 处理结果</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="result" value="all" checked>
                        <span>全部</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="result" value="success">
                        <span>处理得当</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="result" value="failure">
                        <span>应对失策</span>
                    </label>
                </div>
            </div>

            <div class="filter-group">
                <label><i class="fas fa-calendar-alt"></i> 时间范围</label>
                <div class="date-inputs">
                    <input type="date" id="startDate" class="form-control">
                    <div class="date-separator">至</div>
                    <input type="date" id="endDate" class="form-control">
                </div>
            </div>

            <button id="applyFilter" class="filter-button">
                <i class="fas fa-check"></i> 应用筛选
            </button>
        </div>

        <!-- 右侧案例展示区 -->
        <div class="cases-section">
            <div class="cases-grid" id="casesContainer">
                <!-- 案例卡片将由 JavaScript 动态生成 -->
            </div>
        </div>
    </div>
</div>

<!-- 案例详情模态框模板 -->
<template id="caseDetailTemplate">
    <div class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title"></h2>
                <button class="close-button">&times;</button>
            </div>
            <div class="modal-body">
                <!-- 基本信息 -->
                <div class="info-section">
                    <div class="case-meta">
                        <span class="badge badge-type">政府舆情</span>
                        <span class="badge badge-failure">应对失策</span>
                        <span class="case-date">发生时间：2021-05-09</span>
                    </div>
                    <div class="key-metrics">
                        <div class="metric">
                            <span class="metric-value">96小时</span>
                            <span class="metric-label">事件周期</span>
                        </div>
                        <div class="metric">
                            <span class="metric-value">4500万</span>
                            <span class="metric-label">话题阅读量</span>
                        </div>
                        <div class="metric">
                            <span class="metric-value">5月10日12:32</span>
                            <span class="metric-label">首次高峰</span>
                        </div>
                    </div>
                </div>

                <!-- 事件背景 -->
                <div class="background-section">
                    <h3><i class="fas fa-info-circle"></i> 事件背景</h3>
                    <p class="background-content">
                        网络社交媒体日益成为舆论传播的主渠道，呈现出话语权"离散化"与传播权"泛滥化"等特点。其中，负面舆情的产生严重影响社会稳定与和谐发展，对政府的回应能力提出更高要求。政府作为舆情传播中的核心引导者，本应具备与强大的管理能力所匹配的舆论引导力，及时在各类舆情突发事件中站稳脚跟。
                    </p>
                </div>

                <!-- 事件发展过程 -->
                <div class="timeline-section">
                    <h3><i class="fas fa-clock"></i> 事件发展过程</h3>
                    <div class="timeline-visualization">
                        <div class="timeline-chart" id="timelineChart"></div>
                        <div class="timeline-phases">
                            <div class="phase-card">
                                <h4>酝酿扩散期</h4>
                                <time>5月9日18:40</time>
                                <p>该生校内坠亡的消息在微博上曝光。起初公众认为这是一起简单的意外事故，并未了解到事件全貌，因此没有掀起热议。</p>
                            </div>
                            <div class="phase-card">
                                <h4>爆发蔓延期</h4>
                                <time>5月10日12:32</time>
                                <p>坠亡学生的母亲在微博发文。该母亲的表达极具个人悲情化，引起公众关注并转发，舆情首次迎来高潮。此时相关话题阅读量已达到4500万次。</p>
                            </div>
                            <div class="phase-card">
                                <h4>反复波动期</h4>
                                <time>5月11日3:54</time>
                                <p>成都市成华区教育局官微发布官方第一则情况通报。而在这两次通报中只有结论，并未提及事件的具体细节，与舆论关注的焦点相悖，舆论反复波动。</p>
                            </div>
                            <div class="phase-card">
                                <h4>衰减消退期</h4>
                                <time>5月13日</time>
                                <p>官媒详细揭露事实，并肃清一些谣言，引导舆论，舆情才逐渐得以平息。公众对该事件的态度回归理性。</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 问题分析 -->
                <div class="problems-section">
                    <h3><i class="fas fa-exclamation-triangle"></i> 问题分析</h3>
                    <div class="problems-content">
                        <div class="problem-card">
                            <h4>负面舆情快速扩散</h4>
                            <p>网络时代政府并不是信息的唯一发布���，在公众关注事件但细节迟迟得不到披露的情况下，负面舆情便散布开来，将舆情的不可控性推往高潮阶段。</p>
                        </div>
                        <div class="problem-card">
                            <h4>舆情治理逻辑滞后</h4>
                            <p>本应在黄金两小时内处置舆情，但有关部门以"事后处理"的思维应对舆情，同时忽略了事件细节的披露。</p>
                        </div>
                        <div class="problem-card">
                            <h4>回应策略不当</h4>
                            <p>在舆情危机中，政府采取的应对策略未能匹配当下的危机情景，公众需要的是事件的细节信息与政府处理事件的态度，而非可有可无的回避性声明。</p>
                        </div>
                    </div>
                </div>

                <!-- 教训启示 -->
                <div class="lessons-section">
                    <h3><i class="fas fa-lightbulb"></i> 教训启示</h3>
                    <div class="lessons-content">
                        <div class="lesson-item">
                            <h4>及时发布权威信息</h4>
                            <p>政府应以权威信息消解公众的疑惑，树立公信力，及时��破信息茧房。</p>
                        </div>
                        <div class="lesson-item">
                            <h4>重视信息透明度</h4>
                            <p>及时披露事件细节，避免因信息不透明引发公众猜疑。</p>
                        </div>
                        <div class="lesson-item">
                            <h4>加强人文关怀</h4>
                            <p>以柔性治理回应公众关切，避免冰冷的官方表态。</p>
                        </div>
                        <div class="lesson-item">
                            <h4>把握舆论主动权</h4>
                            <p>及时介入舆论引导，避免负面舆情占据舆论阵地。</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
{% endblock %}

{% block js %}
<!-- 使用字节跳动CDN -->
<script src="https://lf26-cdn-tos.bytecdntp.com/cdn/expire-1-M/jquery/3.6.0/jquery.min.js"></script>
<script src="https://lf26-cdn-tos.bytecdntp.com/cdn/expire-1-M/echarts/5.4.3/echarts.min.js"></script>
<script src="{{ url_for('static', filename='assets/js/case_analysis.js') }}"></script>
{% endblock %}
