version: '3'

services:
  web:
    build: .
    expose:
      - "8000"
    volumes:
      - .:/app
      - static_volume:/app/static
    environment:
      - FLASK_ENV=production
      - REDIS_URL=redis://redis:6379/0
    restart: always
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/static
    depends_on:
      - web
    restart: always

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    restart: always

volumes:
  redis_data:
  static_volume: 