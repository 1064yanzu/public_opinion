    <style>
        /* 主题变量 */
        :root {
            --table-bg: #ffffff;
            --table-header-bg: #f8f9fa;
            --table-border: #e5e7eb;
            --table-text: #374151;
            --table-hover-bg: #f3f4f6;
            --table-link: #3b82f6;
            --table-link-hover: #2563eb;
            --content-max-lines: 3;
            --modal-bg: #ffffff;
            --modal-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.2);
            --modal-border: #f0f0f0;
            --modal-backdrop: rgba(17, 24, 39, 0.7);
            --modal-button-bg: #f8fafc;
            --modal-button-hover: #f1f5f9;
            --modal-button-active: #e2e8f0;
            --modal-button-text: #1e293b;
            --modal-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --modal-text: #1e293b;
        }

        [data-theme="dark"] {
            --table-bg: #1f2937;
            --table-header-bg: #111827;
            --table-border: #374151;
            --table-text: #e5e7eb;
            --table-hover-bg: #374151;
            --table-link: #60a5fa;
            --table-link-hover: #93c5fd;
            --modal-bg: #1e1e1e;
            --modal-border: #2d2d2d;
            --modal-button-bg: #2d2d2d;
            --modal-button-hover: #3d3d3d;
            --modal-button-active: #4d4d4d;
            --modal-button-text: #e5e7eb;
            --modal-text: #e5e7eb;
        }

        /* 基础样式 */
        .data-table-wrapper {
            background: var(--table-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin: 1rem 0;
            padding: 1.5rem;
            border: 1px solid var(--table-border);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* 表格控制区 */
        .table-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: var(--table-header-bg);
            border-radius: 8px;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .table-controls select,
        .table-controls input {
            padding: 0.625rem 1rem;
            border: 1px solid var(--table-border);
            border-radius: 6px;
            background: var(--table-bg);
            color: var(--table-text);
            min-width: 120px;
            max-width: 200px;
            width: 100%;
            transition: all 0.2s ease;
        }

        .table-controls select:focus,
        .table-controls input:focus {
            outline: none;
            border-color: var(--table-link);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        /* 表格样式 */
        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-bottom: 1rem;
            table-layout: fixed;
        }

        .data-table th,
        .data-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--table-border);
            color: var(--table-text);
            line-height: 1.6;
            vertical-align: top;
        }

        /* 设置列宽 */
        .data-table th:nth-child(1) { width: 12%; } /* 作者 */
        .data-table th:nth-child(2) { width: 40%; } /* 内容 */
        .data-table th:nth-child(3) { width: 15%; } /* 时间 */
        .data-table th:nth-child(4),
        .data-table th:nth-child(5),
        .data-table th:nth-child(6) { width: 11%; } /* 数字列 */

        /* 内容预览 */
        .content-cell {
            position: relative;
            max-width: 100%;
        }

        .content-preview {
            position: relative;
            display: -webkit-box;
            -webkit-line-clamp: var(--content-max-lines);
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.5;
            cursor: pointer;
            color: var(--table-link);
            text-decoration: none;
            transition: all 0.2s ease;
            word-break: break-word;
            padding-right: 2.5rem;
        }

        .content-preview:hover {
            color: var(--table-link-hover);
        }

        .preview-action {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.75rem;
            background: var(--modal-gradient);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            opacity: 0;
            transition: all 0.3s ease;
            white-space: nowrap;
            box-shadow: 0 2px 4px rgba(99, 102, 241, 0.2);
        }

        .content-preview:hover .preview-action {
            opacity: 1;
            transform: translateY(-50%) translateX(-0.25rem);
        }

        /* 模态框容器 */
        .modal-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-container.show {
            display: flex;
        }

        /* 遮罩层 */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(17, 24, 39, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1;
        }

        .modal-container.show .modal-backdrop {
            opacity: 1;
        }

        /* 模态框对话框 */
        .modal-dialog {
            position: relative;
            width: min(90vw, 700px);
            background: var(--modal-bg);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
        }

        .modal-container.show .modal-dialog {
            opacity: 1;
            transform: scale(1);
        }

        /* 模态框头部 */
        .modal-header {
            position: relative;
            padding: 1.5rem;
            background: var(--modal-bg);
            border-bottom: 1px solid var(--modal-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--modal-text);
            margin: 0;
        }

        .modal-close {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            color: var(--modal-text);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .modal-close i {
            font-size: 1.125rem;
        }

        /* 模态框内容 */
        .modal-content {
            padding: 2rem;
            color: var(--modal-text);
            line-height: 1.8;
            font-size: 1rem;
            max-height: calc(85vh - 6rem);
            overflow-y: auto;
            background: var(--modal-bg);
        }

        /* 滚动条美化 */
        .modal-content::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .modal-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .modal-content::-webkit-scrollbar-thumb {
            background: rgba(203, 213, 225, 0.5);
            border-radius: 3px;
        }

        .modal-content::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.7);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .modal-dialog {
                width: 95vw;
                margin: 1rem;
            }

            .modal-header {
                padding: 1.25rem;
            }

            .modal-content {
                padding: 1.5rem;
            }

            .modal-btn {
                padding: 0.625rem;
            }

            .modal-btn span {
                display: none;
            }
        }

        /* 数字列样式 */
        .number-cell {
            text-align: right;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', SFMono-Regular, ui-monospace, monospace;
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .data-table th:nth-child(4),
            .data-table th:nth-child(5),
            .data-table th:nth-child(6),
            .data-table td:nth-child(4),
            .data-table td:nth-child(5),
            .data-table td:nth-child(6) {
                display: none;
            }

            .data-table th:nth-child(1) { width: 20%; }
            .data-table th:nth-child(2) { width: 50%; }
            .data-table th:nth-child(3) { width: 30%; }
        }

        @media (max-width: 768px) {
            .table-controls {
                flex-direction: column;
                align-items: stretch;
            }

            .table-controls select,
            .table-controls input {
                max-width: 100%;
            }

            .data-table th,
            .data-table td {
                padding: 0.75rem;
                font-size: 0.875rem;
            }

            .modal-dialog {
                width: 95vw;
                margin: 1rem;
            }

            .modal-header {
                padding: 1rem;
            }

            .modal-title {
                font-size: 1.125rem;
            }

            .modal-content {
                padding: 1rem;
                font-size: 0.9375rem;
            }

            .modal-btn {
                padding: 0.5rem 1rem;
            }

            .modal-btn span {
                display: none;
            }

            .modal-actions {
                gap: 0.5rem;
            }

            :root {
                --content-max-lines: 2;
            }
        }

        @media (max-width: 480px) {
            .data-table th:nth-child(1),
            .data-table td:nth-child(1) {
                display: none;
            }

            .data-table th:nth-child(2) { width: 70%; }
            .data-table th:nth-child(3) { width: 30%; }

            .table-pagination {
                flex-direction: column;
                gap: 1rem;
            }

            .content-preview.expanded {
                padding: 1.75rem 1.25rem;
            }
        }

        /* 作者链接样式 */
        .author-link {
            position: relative;
            color: var(--table-link);
            text-decoration: none;
            transition: all 0.2s ease;
            padding-right: 2rem;
        }

        .author-link:hover {
            color: var(--table-link-hover);
            text-decoration: none;
        }

        /* 内容预览样式 */
        .content-preview {
            position: relative;
            display: -webkit-box;
            -webkit-line-clamp: var(--content-max-lines);
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.5;
            color: var(--table-text);
            word-break: break-word;
            padding-right: 2.5rem;
        }

        a.content-preview {
            color: var(--table-link);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        a.content-preview:hover {
            color: var(--table-link-hover);
        }

        .preview-action {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.75rem;
            background: var(--modal-gradient);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            opacity: 0;
            transition: all 0.3s ease;
            white-space: nowrap;
            box-shadow: 0 2px 4px rgba(99, 102, 241, 0.2);
            pointer-events: none;
        }

        .author-link:hover .preview-action,
        a.content-preview:hover .preview-action {
            opacity: 1;
            transform: translateY(-50%) translateX(-0.25rem);
        }
    </style>

    </head>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 1. 主题切换功能
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;

            function initTheme() {
                const savedTheme = localStorage.getItem('theme') || 'light';
                const icon = themeToggle.querySelector('i');
                const text = themeToggle.querySelector('span');

                if (savedTheme === 'dark') {
                    body.setAttribute('data-theme', 'dark');
                    icon.classList.replace('fa-moon', 'fa-sun');
                    text.textContent = '日间模式';
                } else {
                    body.removeAttribute('data-theme');
                    icon.classList.replace('fa-sun', 'fa-moon');
                    text.textContent = '夜间模式';
                }
            }

            themeToggle.addEventListener('click', function() {
                const isDark = body.hasAttribute('data-theme');
                const icon = this.querySelector('i');
                const text = this.querySelector('span');

                if (isDark) {
                    body.removeAttribute('data-theme');
                    icon.classList.replace('fa-sun', 'fa-moon');
                    text.textContent = '夜间模式';
                    localStorage.setItem('theme', 'light');
                } else {
                    body.setAttribute('data-theme', 'dark');
                    icon.classList.replace('fa-moon', 'fa-sun');
                    text.textContent = '日间模式';
                    localStorage.setItem('theme', 'dark');
                }
            });

            // 2. 侧边栏控制
            const sidebar = document.getElementById('sidebar');
            const sidebarToggle = document.getElementById('sidebarToggle');
            const main = document.getElementById('main');
            const sidebarOverlay = document.createElement('div');
            sidebarOverlay.className = 'sidebar-overlay';
            document.body.appendChild(sidebarOverlay);

            function toggleSidebar() {
                const isMobile = window.innerWidth <= 768;

                if (isMobile) {
                    sidebar.classList.toggle('show');
                    sidebarOverlay.classList.toggle('show');
                    main.classList.toggle('pushed');
                    document.body.style.overflow = sidebar.classList.contains('show') ? 'hidden' : '';
                } else {
                    sidebar.classList.toggle('collapsed');
                    main.classList.toggle('expanded');
                }
            }

            sidebarToggle.addEventListener('click', toggleSidebar);
            sidebarOverlay.addEventListener('click', toggleSidebar);

            // 3. 语言切换功能
            const langSelect = document.getElementById('langSelect');
            const translations = {
                zh: {
                    pageTitle: '舆情分析系统',
                    themeToggleText: '夜间模式',
                    totalInfo: '总信息数量',
                    commenters: '评论者数量',
                    ipCount: '评论IP地址数',
                    heatValue: '热度值',
                    wordCloud: '词云分析',
                    crawlResults: '爬取结果展示',
                    dailyHot: '每日热点',
                    showEntries: '显示条数',
                    search: '搜索',
                    noData: '暂无数据'
                },
                en: {
                    pageTitle: 'Public Opinion Analysis',
                    themeToggleText: 'Dark Mode',
                    totalInfo: 'Total Information',
                    commenters: 'Commenters',
                    ipCount: 'IP Addresses',
                    heatValue: 'Heat Value',
                    wordCloud: 'Word Cloud',
                    crawlResults: 'Crawl Results',
                    dailyHot: 'Daily Hot',
                    showEntries: 'Show Entries',
                    search: 'Search',
                    noData: 'No Data'
                }
            };

            function updateLanguage(lang) {
                const text = translations[lang];
                if (!text) return;

                // 更新页面文本
                document.querySelector('.page-title').textContent = text.pageTitle;
                document.title = text.pageTitle;

                // 更新统计卡片
                document.querySelectorAll('.stat-label').forEach((el, index) => {
                    const keys = ['totalInfo', 'commenters', 'ipCount', 'heatValue'];
                    if (text[keys[index]]) {
                        el.textContent = text[keys[index]];
                    }
                });

                // 更新卡片标题
                document.querySelectorAll('.card-title').forEach(el => {
                    if (el.textContent.includes('词云')) el.textContent = text.wordCloud;
                    if (el.textContent.includes('爬取')) el.textContent = text.crawlResults;
                    if (el.textContent.includes('热点')) el.textContent = text.dailyHot;
                });

                // 更新表格控件
                const entriesLabel = document.querySelector('label[for="entriesPerPage"]');
                const searchLabel = document.querySelector('label[for="searchInput"]');
                if (entriesLabel) entriesLabel.textContent = text.showEntries + ':';
                if (searchLabel) searchLabel.textContent = text.search + ':';
            }

            langSelect.addEventListener('change', function(e) {
                const lang = e.target.value;
                localStorage.setItem('selectedLang', lang);
                updateLanguage(lang);
            });

            // 4. 表格功能
            const table = document.getElementById('crawlTable');
            if (table) {
                const tbody = table.querySelector('tbody');
                const rows = Array.from(tbody.querySelectorAll('tr'));
                let currentPage = 1;
                let entriesPerPage = 10;
                let filteredRows = [...rows];

                function updateTable() {
                    const start = (currentPage - 1) * entriesPerPage;
                    const end = entriesPerPage === -1 ? filteredRows.length : Math.min(start + entriesPerPage, filteredRows.length);

                    tbody.innerHTML = '';
                    for (let i = start; i < end; i++) {
                        tbody.appendChild(filteredRows[i].cloneNode(true));
                    }

                    updatePagination();
                    updateTableInfo(start, end);
                }

                function updatePagination() {
                    const totalPages = entriesPerPage === -1 ? 1 : Math.ceil(filteredRows.length / entriesPerPage);
                    const pageNumbers = document.getElementById('pageNumbers');
                    if (!pageNumbers) return;

                    pageNumbers.innerHTML = '';
                    for (let i = 1; i <= totalPages; i++) {
                        const button = document.createElement('button');
                        button.className = `btn ${i === currentPage ? 'btn-primary' : 'btn-outline-primary'}`;
                        button.textContent = i;
                        button.addEventListener('click', () => {
                            currentPage = i;
                            updateTable();
                        });
                        pageNumbers.appendChild(button);
                    }

                    // 更新翻页按钮状态
                    const prevBtn = document.getElementById('prevPage');
                    const nextBtn = document.getElementById('nextPage');
                    if (prevBtn) prevBtn.disabled = currentPage === 1;
                    if (nextBtn) nextBtn.disabled = currentPage === totalPages;
                }

                function updateTableInfo(start, end) {
                    const startEntry = document.getElementById('startEntry');
                    const endEntry = document.getElementById('endEntry');
                    const totalEntries = document.getElementById('totalEntries');

                    if (startEntry) startEntry.textContent = filteredRows.length ? start + 1 : 0;
                    if (endEntry) endEntry.textContent = end;
                    if (totalEntries) totalEntries.textContent = filteredRows.length;
                }

                // 搜索功能
                const searchInput = document.getElementById('searchInput');
                if (searchInput) {
                    searchInput.addEventListener('input', function(e) {
                        const searchTerm = e.target.value.toLowerCase();
                        filteredRows = rows.filter(row => {
                            return row.textContent.toLowerCase().includes(searchTerm);
                        });
                        currentPage = 1;
                        updateTable();
                    });
                }

                // 每页显示条数
                const entriesSelect = document.getElementById('entriesPerPage');
                if (entriesSelect) {
                    entriesSelect.addEventListener('change', function(e) {
                        entriesPerPage = parseInt(e.target.value);
                        currentPage = 1;
                        updateTable();
                    });
                }

                // 翻页按钮
                const prevBtn = document.getElementById('prevPage');
                const nextBtn = document.getElementById('nextPage');
                if (prevBtn) {
                    prevBtn.addEventListener('click', () => {
                        if (currentPage > 1) {
                            currentPage--;
                            updateTable();
                        }
                    });
                }
                if (nextBtn) {
                    nextBtn.addEventListener('click', () => {
                        const totalPages = Math.ceil(filteredRows.length / entriesPerPage);
                        if (currentPage < totalPages) {
                            currentPage++;
                            updateTable();
                        }
                    });
                }

                // 初始化表格
                updateTable();
            }

            // 5. 初始化所有功能
            initTheme();
            const savedLang = localStorage.getItem('selectedLang') || 'zh';
            langSelect.value = savedLang;
            updateLanguage(savedLang);

            // 6. 响应式处理
            let resizeTimeout;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(function() {
                    const isMobile = window.innerWidth <= 768;
                    if (!isMobile && sidebar.classList.contains('show')) {
                        sidebar.classList.remove('show');
                        sidebarOverlay.classList.remove('show');
                        main.classList.remove('pushed');
                        document.body.style.overflow = '';
                    }
                }, 250);
            });
        });
    </script>

    <!-- 在body末尾添加模态框容器 -->
    <div class="modal-container" id="modalContainer">
        <div class="modal-backdrop"></div>
        <div class="modal-dialog">
            <div class="modal-header">
                <div class="modal-title">内容详情</div>
                <button class="modal-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-content"></div>
        </div>
    </div>

<script>
async function loadHomeData() {
  const container = document.querySelector('.container-fluid p-0');
  const fallback = document.getElementById('homeFallback');
  try {
    const ctrl = new AbortController();
    const timeout = setTimeout(() => ctrl.abort(), 15000);
    const res = await fetch("{{ url_for('page.get_home_data') }}", { signal: ctrl.signal, headers: { 'Accept': 'application/json' }, credentials: 'same-origin' });
    clearTimeout(timeout);
    if (!res.ok) throw new Error('网络响应异常: ' + res.status);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || '加载失败');
    const data = json.data || {};
    if (!(data && typeof data === 'object')) throw new Error('数据格式异常');

    // 统计卡片
    document.getElementById('statRowCount').textContent = data.row_count ?? 0;
    document.getElementById('statUniqueUsers').textContent = data.unique_user_count ?? 0;
    document.getElementById('statUniqueIPs').textContent = data.unique_ip_count ?? 0;
    document.getElementById('statHeat').textContent = data.total_heat_value ?? 0;

    // 列表
    const infos = Array.isArray(data.infos2_data) ? data.infos2_data : [];
    document.getElementById('infosCount').textContent = infos.length;
    const tbody = document.getElementById('infosTbody');
    tbody.innerHTML = '';
    for (const info of infos) {
      // 跳过无效行
      if ((info.content || '') === '无内容' || (info.author || '') === '无作者') continue;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${info.profile_url ? `<a href="${info.profile_url}" target="_blank" class="author-link">${info.author}<span class="preview-action">访问主页</span></a>` : (info.author || '')}</td>
        <td class="content-cell">${info.url ? `<a href="${info.url}" target="_blank" class="content-preview">${info.content}<span class="preview-action">查看原文</span></a>` : `<div class="content-preview">${info.content || ''}</div>`}</td>
        <td>${info.time || ''}</td>
        <td class="number-cell">${info.shares ?? 0}</td>
        <td class="number-cell">${info.comments ?? 0}</td>
        <td class="number-cell">${info.likes ?? 0}</td>`;
      tbody.appendChild(tr);
    }

    // 分页信息初始化
    document.getElementById('totalEntries').textContent = infos.length;

    // 热点
    const hotspots = Array.isArray(data.daily_hotspots) ? data.daily_hotspots : [];
    const hotspotRow = document.getElementById('hotspotRow');
    hotspotRow.innerHTML = '';
    for (const news of hotspots) {
      const col = document.createElement('div');
      col.className = 'col-lg-3 col-md-6';
      const link = news.link || '#';
      const title = news.title || '';
      const source = news.source || '';
      col.innerHTML = `
        <a href="${link}" class="card news-card" target="_blank">
          <div class="news-image" style="background-image: url('${"{{ url_for('static', filename='assets/images/newscard.png') }}"}');"></div>
          <div class="news-content">
            <h3 class="news-title">${title}</h3>
            <div class="news-source"><i class="fas fa-newspaper"></i><span>来源: ${source}</span></div>
          </div>
        </a>`;
      hotspotRow.appendChild(col);
    }

    // 初始化表格排序/分页搜索
    setupTableFeatures();
  } catch (err) {
    console.error('加载首页数据失败:', err);
    if (fallback) {
      const msgEl = document.getElementById('homeFallbackMsg');
      if (msgEl) msgEl.textContent = err && err.message ? err.message : String(err);
      fallback.style.display = '';
      fallback.classList.remove('d-none');
    }
  }
}

function setupTableFeatures() {
  // 复用原有表格逻辑：在已渲染的 tbody 基础上重建 rows 缓存
  const table = document.getElementById('crawlTable');
  if (!table) return;
  const tbody = table.querySelector('tbody');
  const rows = Array.from(tbody.querySelectorAll('tr'));
  let currentPage = 1;
  let entriesPerPage = 10;
  let filteredRows = [...rows];

  function updateTable() {
    const start = (currentPage - 1) * entriesPerPage;
    const end = entriesPerPage === -1 ? filteredRows.length : Math.min(start + entriesPerPage, filteredRows.length);

    tbody.innerHTML = '';
    for (let i = start; i < end; i++) tbody.appendChild(filteredRows[i].cloneNode(true));

    updatePagination();
    updateTableInfo(start, end);
  }

  function updatePagination() {
    const totalPages = entriesPerPage === -1 ? 1 : Math.ceil(filteredRows.length / entriesPerPage);
    const pageNumbers = document.getElementById('pageNumbers');
    if (!pageNumbers) return;
    pageNumbers.innerHTML = '';
    for (let i = 1; i <= totalPages; i++) {
      const button = document.createElement('button');
      button.className = `btn ${i === currentPage ? 'btn-primary' : 'btn-outline-primary'}`;
      button.textContent = i;
      button.addEventListener('click', () => { currentPage = i; updateTable(); });
      pageNumbers.appendChild(button);
    }
    const prevBtn = document.getElementById('prevPage');
    const nextBtn = document.getElementById('nextPage');
    if (prevBtn) prevBtn.disabled = currentPage === 1;
    if (nextBtn) nextBtn.disabled = currentPage === totalPages;
  }

  function updateTableInfo(start, end) {
    const startEntry = document.getElementById('startEntry');
    const endEntry = document.getElementById('endEntry');
    const totalEntries = document.getElementById('totalEntries');
    if (startEntry) startEntry.textContent = filteredRows.length ? start + 1 : 0;
    if (endEntry) endEntry.textContent = end;
    if (totalEntries) totalEntries.textContent = filteredRows.length;
  }

  const searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.addEventListener('input', function(e) {
      const term = e.target.value.toLowerCase();
      filteredRows = rows.filter(row => row.textContent.toLowerCase().includes(term));
      currentPage = 1;
      updateTable();
    });
  }

  const entriesSelect = document.getElementById('entriesPerPage');
  if (entriesSelect) {
    entriesSelect.addEventListener('change', function(e) {
      entriesPerPage = parseInt(e.target.value);
      currentPage = 1;
      updateTable();
    });
  }

  const prevBtn = document.getElementById('prevPage');
  const nextBtn = document.getElementById('nextPage');
  if (prevBtn) prevBtn.addEventListener('click', () => { if (currentPage > 1) { currentPage--; updateTable(); } });
  if (nextBtn) nextBtn.addEventListener('click', () => {
    const totalPages = Math.ceil(filteredRows.length / entriesPerPage);
    if (currentPage < totalPages) { currentPage++; updateTable(); }
  });

  updateTable();
}

// 页面就绪后异步加载数据
window.addEventListener('DOMContentLoaded', () => {
  loadHomeData();
});
</script>
