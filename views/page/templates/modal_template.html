<!-- 模态框 -->
<div class="modal-overlay" id="caseModal">
    <div class="modal-container">
        <button class="modal-close" onclick="hideModal()">×</button>
        <div class="case-study-container">
            <article class="case-study">
                <!-- 案例标题和背景 -->
                <header class="case-header">
                    <h1 class="case-title"></h1>
                    <p class="case-background"></p>
                </header>

                <!-- 时间轴部分 -->
                <section class="timeline">
                    <!-- 时间轴内容将通过JavaScript动态生成 -->
                </section>

                <!-- 问题分析部分 -->
                <section class="analysis-section">
                    <h2 class="section-title">问题分析</h2>
                    <div class="analysis-grid">
                        <!-- 分析内容将通过JavaScript动态生成 -->
                    </div>
                </section>

                <!-- 经验教训部分 -->
                <section class="lessons-section">
                    <h2 class="section-title">经验教训</h2>
                    <div class="lessons-grid">
                        <!-- 经验教训内容将通过JavaScript动态生成 -->
                    </div>
                </section>
            </article>
        </div>
    </div>
</div>
