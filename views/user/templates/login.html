<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            color: #333;
            line-height: 1.5;
            background: linear-gradient(135deg, #E3F2FD, #BBDEFB, #90CAF9);
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .form-box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 60px;
            width: 380px;
            box-shadow: 0 10px 40px 0 rgba(31, 38, 135, 0.15);
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .form-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px 0 rgba(31, 38, 135, 0.2);
        }

        h2 {
            color: #1976D2;
            text-align: center;
            margin-bottom: 40px;
            font-weight: 600;
            font-size: 28px;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        input {
            width: calc(100% - 70px);
            padding: 15px 15px 15px 50px;
            border: 1px solid #BBDEFB;
            border-radius: 15px;
            background: #FFFFFF;
            color: #333;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #64B5F6;
            box-shadow: 0 0 0 4px rgba(100, 181, 246, 0.2);
        }

        input::placeholder {
            color: #BDBDBD;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #BBDEFB;
            font-size: 18px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: #2196F3;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: #1976D2;
        }

        button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255,255,255,0.2);
            transform: rotate(45deg);
            transition: all 0.3s ease;
        }

        button:hover::after {
            left: 100%;
            top: 100%;
        }

        .switch, .forgot-password {
            text-align: center;
            margin-top: 20px;
            font-size: 16px;
            color: #757575;
        }

        .switch a, .forgot-password a {
            color: #2196F3;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .switch a:hover, .forgot-password a:hover {
            color: #1565C0;
            text-decoration: underline;
        }

        .decoration {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(45deg, #64B5F6, #2196F3);
            filter: blur(60px);
            opacity: 0.5;
            z-index: 0;
        }

        .decoration-1 {
            top: -100px;
            left: -100px;
        }

        .decoration-2 {
            bottom: -100px;
            right: -100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="decoration decoration-1"></div>
        <div class="decoration decoration-2"></div>
        <div class="form-box" id="loginForm">
            <h2><i class="fas fa-user-circle"></i> 欢迎回来</h2>
            <form action="{{ url_for('user.login') }}" method="post">
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" name="username" placeholder="用户名或电子邮件" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" name="password" placeholder="密码" required>
                </div>
                <button type="submit"><i class="fas fa-sign-in-alt"></i> 登录</button>
            </form>
            <div class="forgot-password">
                <a href="{{ url_for('user.forget') }}"><i class="fas fa-key"></i> 忘记密码？</a>
            </div>
            <div class="switch">
                还没有账号？<a href="{{ url_for('user.register') }}">立即注册</a>
            </div>
        </div>
    </div>
</body>
</html>
