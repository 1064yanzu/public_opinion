<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户设置</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            color: #333;
        }
        .settings-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .settings-header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #dee2e6;
        }
        .settings-section {
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .btn-save {
            min-width: 120px;
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <div class="settings-header">
            <h2><i class="fas fa-cog"></i> 用户设置</h2>
            <p class="text-muted">自定义您的个人偏好设置</p>
        </div>

        <form method="post">
            <div class="settings-section">
                <h4>基本设置</h4>
                <div class="form-group">
                    <label for="theme">界面主题</label>
                    <select class="form-control" id="theme" name="theme">
                        <option value="light" {% if settings.get('theme') == 'light' %}selected{% endif %}>浅色</option>
                        <option value="dark" {% if settings.get('theme') == 'dark' %}selected{% endif %}>深色</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="language">界面语言</label>
                    <select class="form-control" id="language" name="language">
                        <option value="zh-CN" {% if settings.get('language') == 'zh-CN' %}selected{% endif %}>简体中文</option>
                        <option value="en" {% if settings.get('language') == 'en' %}selected{% endif %}>English</option>
                    </select>
                </div>
            </div>

            <div class="settings-section">
                <h4>爬虫设置</h4>
                <div class="form-group">
                    <label for="default_platform">默认平台</label>
                    <select class="form-control" id="default_platform" name="default_platform">
                        <option value="weibo" {% if settings.get('default_platform') == 'weibo' %}selected{% endif %}>微博</option>
                        <option value="douyin" {% if settings.get('default_platform') == 'douyin' %}selected{% endif %}>抖音</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="crawl_interval">爬取间隔（分钟）</label>
                    <input type="number" class="form-control" id="crawl_interval" name="crawl_interval" 
                           value="{{ settings.get('crawl_interval', '60') }}" min="1" max="1440">
                </div>

                <div class="form-group">
                    <label for="max_items">每次爬取最大条数</label>
                    <input type="number" class="form-control" id="max_items" name="max_items" 
                           value="{{ settings.get('max_items', '100') }}" min="1" max="1000">
                </div>
            </div>

            <div class="settings-section">
                <h4>通知设置</h4>
                <div class="form-group">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="email_notify" name="email_notify" value="1"
                               {% if settings.get('email_notify') == '1' %}checked{% endif %}>
                        <label class="form-check-label" for="email_notify">启用邮件通知</label>
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="task_notify" name="task_notify" value="1"
                               {% if settings.get('task_notify') == '1' %}checked{% endif %}>
                        <label class="form-check-label" for="task_notify">任务完成通知</label>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary btn-save">
                    <i class="fas fa-save"></i> 保存设置
                </button>
                <a href="{{ url_for('page.home') }}" class="btn btn-secondary ms-2">
                    <i class="fas fa-arrow-left"></i> 返回
                </a>
            </div>
        </form>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.1/js/bootstrap.bundle.min.js"></script>
</body>
</html>
